<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Validation Tool - Mobile Optimized</title>
  <style>
    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background: #000; color: #fff; font-family: Arial, sans-serif;
      overflow: hidden; touch-action: none; /* Prevents pull-to-refresh on mobile */
    }

    #viewer {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; justify-content: center; align-items: center;
      z-index: 1; background: #000;
    }

    video {
      position: absolute; width: 100%; height: 100%; object-fit: contain;
      transform-origin: center center;
      transition: transform 0.1s ease, filter 0.1s ease;
    }

    /* Color Temp Overlay */
    #tempOverlay {
      position: absolute; inset: 0; pointer-events: none; z-index: 10; mix-blend-mode: overlay;
    }

    /* Target Guide */
    #ghostTarget {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 220px; height: 300px; border: 3px dashed rgba(255, 255, 255, 0.6);
      border-radius: 50%; pointer-events: none; z-index: 20; display: none;
    }
    #ghostTarget.active { display: block; }

    #hud {
      position: fixed; top: 15px; left: 15px; z-index: 30;
      padding: 10px; border-radius: 8px; background: rgba(0,0,0,0.6);
      font-size: 14px; backdrop-filter: blur(5px);
    }

    #toggleBtn {
      position: fixed; top: 15px; right: 15px; z-index: 50;
      width: 45px; height: 45px; border: none; border-radius: 50%;
      background: rgba(255,255,255,0.2); color: #fff; font-size: 24px; cursor: pointer;
    }

    /* Scrollable Mobile Controls */
    #controls {
      position: fixed; bottom: 0; left: 0; width: 100%;
      max-height: 55vh; overflow-y: auto; background: rgba(15, 15, 15, 0.95);
      z-index: 40; padding: 15px; padding-bottom: 30px; box-sizing: border-box;
      border-top: 2px solid #58a6ff; transition: transform 0.3s ease;
    }
    #controls.hidden { transform: translateY(100%); }

    /* Checkbox Grid for Mobile */
    .toggles-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
      background: #222; padding: 15px; border-radius: 8px; margin-bottom: 15px;
    }
    .toggles-grid label { display: flex; align-items: center; gap: 8px; font-size: 15px; }
    .toggles-grid input[type="checkbox"] { width: 18px; height: 18px; }

    /* Sliders */
    .slider-group { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
    .slider-group label { width: 90px; font-size: 14px; }
    .slider-group input[type="range"] { flex: 1; height: 6px; }
    .slider-group .val { width: 40px; text-align: right; font-size: 12px; }

    /* Buttons */
    .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
    button { padding: 12px; border-radius: 8px; border: none; font-weight: bold; font-size: 14px; color: #fff; cursor: pointer; }
    .btn-blue { background: #1f6feb; }
    .btn-red { background: #f85149; }
    .btn-gray { background: #30363d; }
    
    .btn-massive { 
      grid-column: span 2; background: #238636; font-size: 18px; 
      padding: 16px; margin-top: 10px; border: 2px solid #2ea043;
    }

    /* Playback Video (Hides main video) */
    #playbackVideo { z-index: 5; display: none; }

    /* Stealth Presentation Mode */
    body.stealth-mode #controls,
    body.stealth-mode #hud,
    body.stealth-mode #toggleBtn,
    body.stealth-mode #ghostTarget { display: none !important; }
    
    body.stealth-mode #camera { display: none; }
    body.stealth-mode #playbackVideo { display: block; }
  </style>
</head>
<body>

  <div id="hud">System Ready</div>
  <button id="toggleBtn">⚙️</button>

  <div id="viewer">
    <video id="camera" autoplay playsinline muted></video>
    <video id="playbackVideo" playsinline muted></video>
    <div id="ghostTarget"></div>
    <div id="tempOverlay"></div>
  </div>

  <div id="controls">
    
    <div class="toggles-grid">
      <label><input type="checkbox" id="showGhost"> Show Guide</label>
      <label><input type="checkbox" id="mirror" checked> Mirror</label>
      <label><input type="checkbox" id="autoLight" checked> Auto Light</label>
    </div>

    <div class="slider-group"><label>Zoom</label><input type="range" id="zoom" min="1" max="3" step="0.05" value="1"><div class="val" id="zoomVal">1.0</div></div>
    <div class="slider-group"><label>Pan X</label><input type="range" id="panX" min="-300" max="300" step="5" value="0"><div class="val" id="panXVal">0</div></div>
    <div class="slider-group"><label>Pan Y</label><input type="range" id="panY" min="-300" max="300" step="5" value="0"><div class="val" id="panYVal">0</div></div>
    <div class="slider-group"><label>Brightness</label><input type="range" id="brightness" min="0.5" max="1.5" step="0.05" value="1.0"><div class="val" id="brightVal">1.0</div></div>
    <div class="slider-group"><label>Contrast</label><input type="range" id="contrast" min="0.5" max="1.5" step="0.05" value="1.05"><div class="val" id="contVal">1.05</div></div>
    <div class="slider-group"><label>Temp</label><input type="range" id="temperature" min="-50" max="50" step="1" value="0"><div class="val" id="tempVal">0</div></div>

    <div class="btn-grid">
      <button class="btn-blue" id="startCamBtn">1. Start Camera</button>
      <button class="btn-gray" id="centerBtn">Center Image</button>
      <button class="btn-blue" id="recordBtn">2. Start Record</button>
      <button class="btn-red" id="stopBtn">3. Stop Record</button>
      <button class="btn-massive" id="playFullBtn">▶ PLAY FULLSCREEN BYPASS</button>
    </div>
  </div>

  <script>
    const camera = document.getElementById('camera');
    const playbackVideo = document.getElementById('playbackVideo');
    const ghostTarget = document.getElementById('ghostTarget');
    const tempOverlay = document.getElementById('tempOverlay');
    const controls = document.getElementById('controls');
    const hud = document.getElementById('hud');
    
    // Inputs
    const showGhost = document.getElementById('showGhost');
    const mirror = document.getElementById('mirror');
    const zoom = document.getElementById('zoom');
    const panX = document.getElementById('panX');
    const panY = document.getElementById('panY');
    const brightness = document.getElementById('brightness');
    const contrast = document.getElementById('contrast');
    const temperature = document.getElementById('temperature');

    let stream = null;
    let recorder = null;
    let recordedChunks = [];
    let recordStartTime = 0;
    let exactDuration = 0; // Fix for mobile webm duration bug
    let pingPongInterval;
    let isReversing = false;

    // View Update Logic
    function updateView() {
      const transform = `translate(${panX.value}px, ${panY.value}px) scaleX(${mirror.checked ? -1 : 1}) scale(${zoom.value})`;
      const filter = `brightness(${brightness.value}) contrast(${contrast.value})`;

      camera.style.transform = transform;
      camera.style.filter = filter;
      playbackVideo.style.transform = transform;
      playbackVideo.style.filter = filter;

      // Color Temp
      let temp = Number(temperature.value);
      if (temp > 0) tempOverlay.style.background = `rgba(255, 140, 0, ${temp / 150})`;
      else if (temp < 0) tempOverlay.style.background = `rgba(0, 130, 255, ${Math.abs(temp) / 150})`;
      else tempOverlay.style.background = 'transparent';

      // Ghost Target
      ghostTarget.className = showGhost.checked ? 'active' : '';

      // Labels
      document.getElementById('zoomVal').innerText = zoom.value;
      document.getElementById('panXVal').innerText = panX.value;
      document.getElementById('panYVal').innerText = panY.value;
      document.getElementById('brightVal').innerText = brightness.value;
      document.getElementById('contVal').innerText = contrast.value;
      document.getElementById('tempVal').innerText = temperature.value;
    }

    [zoom, panX, panY, brightness, contrast, temperature, mirror, showGhost].forEach(el => el.addEventListener('input', updateView));

    // Buttons
    document.getElementById('toggleBtn').addEventListener('click', () => controls.classList.toggle('hidden'));
    
    document.getElementById('centerBtn').addEventListener('click', () => {
      panX.value = 0; panY.value = 0; updateView();
    });

    // Camera Start
    document.getElementById('startCamBtn').addEventListener('click', async () => {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 1280 } } });
        camera.srcObject = stream;
        hud.innerText = "Camera Active - Adjust Guide";
        playbackVideo.style.display = 'none';
        camera.style.display = 'block';
      } catch (e) { hud.innerText = "Camera Error"; }
    });

    // Record Start
    document.getElementById('recordBtn').addEventListener('click', () => {
      if (!stream) return alert('Start camera first!');
      recordedChunks = [];
      recorder = new MediaRecorder(stream);
      recorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
      
      recorder.onstop = () => {
        exactDuration = (Date.now() - recordStartTime) / 1000; // Exact length
        const blob = new Blob(recordedChunks, { type: 'video/webm' });
        playbackVideo.src = URL.createObjectURL(blob);
        hud.innerText = `Saved (${exactDuration.toFixed(1)}s). Ready for bypass.`;
      };
      
      recorder.start();
      recordStartTime = Date.now();
      hud.innerText = "🔴 RECORDING... Look at camera naturally";
    });

    // Record Stop
    document.getElementById('stopBtn').addEventListener('click', () => {
      if (recorder && recorder.state === "recording") recorder.stop();
    });

    // Custom Ping Pong Loop (Works perfectly on Mobile)
    function checkPingPong() {
        if (!isReversing && playbackVideo.currentTime >= (exactDuration - 0.2)) {
            isReversing = true;
            playbackVideo.pause();
            pingPongInterval = setInterval(() => {
                playbackVideo.currentTime -= 0.05;
                if (playbackVideo.currentTime <= 0.1) {
                    clearInterval(pingPongInterval);
                    isReversing = false;
                    playbackVideo.play();
                }
            }, 50);
        }
    }

    // Play Fullscreen Bypass
    document.getElementById('playFullBtn').addEventListener('click', async () => {
      if (!playbackVideo.src) return alert("Record a video first!");
      
      // Enter Stealth Mode
      document.body.classList.add('stealth-mode');
      
      // Request Fullscreen
      if (document.documentElement.requestFullscreen) {
        await document.documentElement.requestFullscreen();
      }
      
      // Start Video
      isReversing = false;
      playbackVideo.currentTime = 0;
      playbackVideo.loop = false; // We handle loop manually
      playbackVideo.addEventListener('timeupdate', checkPingPong);
      await playbackVideo.play();

      // Double tap to exit
      document.body.addEventListener('dblclick', exitStealthMode);
    });

    function exitStealthMode() {
      document.body.classList.remove('stealth-mode');
      if (document.fullscreenElement) document.exitFullscreen();
      playbackVideo.pause();
      clearInterval(pingPongInterval);
      playbackVideo.removeEventListener('timeupdate', checkPingPong);
      document.body.removeEventListener('dblclick', exitStealthMode);
    }

    updateView();
  </script>
</body>
</html>
