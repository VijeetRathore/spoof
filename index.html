<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Advanced Biometric Scanner Pro</title>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

  <style>
    :root{ --panel-bg: rgba(18,18,18,0.94); --accent: #58a6ff; --text: #ffffff; }
    * { box-sizing: border-box; }
    body{ margin:0; background:#000; color:var(--text); font-family:Courier New, monospace; overflow:hidden; }

    #viewer{ position:relative; width:100vw; height:100vh; display:flex; justify-content:center; align-items:center; overflow:hidden; background:#000; }
    
    video, canvas{
      position:absolute; max-width:100%; max-height:100%; object-fit:contain; 
      transform-origin:center center; will-change:transform, filter;
      transition:transform 0.18s ease, filter 0.18s ease;
    }

    #camera{ z-index:2; display:none; } /* Hidden, only used for feed */
    #output_canvas{ z-index:3; } /* Shows video + mesh */
    #freezeCanvas{ display:none; z-index:4; }

    #hud{ position:fixed; top:10px; left:10px; z-index:30; padding:10px 15px; border-radius:10px; background:rgba(0,0,0,0.6); font-size:14px; font-weight:bold; color: #58a6ff; white-space:pre-line; text-shadow: 1px 1px 2px #000; }
    
    /* Dynamic Vector Panel */
    #vectorPanel { position:fixed; top:10px; right:10px; z-index:30; background:rgba(0,0,0,0.7); padding:15px; border: 1px solid #30363d; border-radius:8px; width: 250px; font-size: 12px; }
    .vector-row { display: flex; justify-content: space-between; margin-bottom: 4px; border-bottom: 1px solid #333; padding-bottom: 2px;}
    .vector-val { color: #3fb950; }

    #controls{ position:fixed; left:0; bottom:0; width:100%; z-index:35; padding:15px; background:var(--panel-bg); border-top:2px solid var(--accent); transition:transform 0.28s ease; max-height:40vh; overflow-y:auto; display: flex; flex-wrap: wrap; gap: 15px; justify-content: center;}
    
    .group{ display:flex; align-items:center; gap:10px; min-width: 250px;}
    label{ width:80px; font-size:14px; }
    input[type="range"]{ flex:1; }
    
    button { padding:10px 15px; border-radius:8px; border:none; font-weight:bold; cursor:pointer; }
    .action{ background:#1f6feb; color:#fff; }
    .action:hover{ background:#388bfd; }
    .warn{ background:#d29922; color:#111; }
    .danger{ background:#f85149; color:#fff; }
    
    .spoof-alert { color: #f85149; animation: blink 1s infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>

  <div id="hud">System Initializing...</div>
  
  <div id="vectorPanel">
      <h4 style="margin-top:0; color:#58a6ff; border-bottom:1px solid #58a6ff; padding-bottom:5px;">Live 3D Vectors</h4>
      <div id="vectorData">Awaiting Face...</div>
  </div>

  <div id="viewer">
    <video id="camera" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>
    <canvas id="freezeCanvas"></canvas>
  </div>

  <div id="controls">
    <div class="group">
      <label>Zoom</label>
      <input type="range" id="zoom" min="1" max="3" step="0.05" value="1">
    </div>
    <div class="group">
      <label>Pan X</label>
      <input type="range" id="panX" min="-300" max="300" step="5" value="0">
    </div>
    <div class="group">
      <label>Pan Y</label>
      <input type="range" id="panY" min="-300" max="300" step="5" value="0">
    </div>
    <div class="group">
      <label>Brightness</label>
      <input type="range" id="brightness" min="0.5" max="1.5" step="0.05" value="1">
    </div>
    
    <div style="width: 100%; display: flex; justify-content: center; gap: 10px; margin-top: 10px;">
        <button class="warn" id="meshToggleBtn" onclick="toggleMesh()">Toggle 3D Mesh</button>
        <button class="action" id="smartFreezeBtn" onclick="startSmartFreeze()">Smart Capture (2s)</button>
        <button class="danger" onclick="location.reload()">Reset System</button>
    </div>
  </div>

  <script>
    const video = document.getElementById('camera');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const freezeCanvas = document.getElementById('freezeCanvas');
    const freezeCtx = freezeCanvas.getContext('2d');
    const hud = document.getElementById('hud');
    const vectorData = document.getElementById('vectorData');

    // UI Controls
    const zoomSlider = document.getElementById('zoom');
    const panXSlider = document.getElementById('panX');
    const panYSlider = document.getElementById('panY');
    const brightnessSlider = document.getElementById('brightness');

    let showMesh = true;
    let livenessScore = 0;
    let blinkCount = 0;
    let isSmartFreezing = false;
    let smartFreezeFrames = [];
    let lastEyeDist = 0;

    // Set internal resolution
    canvasElement.width = 1280; canvasElement.height = 720;
    freezeCanvas.width = 1280; freezeCanvas.height = 720;

    function toggleMesh() { showMesh = !showMesh; }

    function updateView() {
      // Mirroring is applied via scaleX(-1) in transform
      const transform = `translate(${panXSlider.value}px, ${panYSlider.value}px) scaleX(-1) scale(${zoomSlider.value})`;
      const filter = `brightness(${brightnessSlider.value}) contrast(1.1)`;
      
      canvasElement.style.transform = transform;
      canvasElement.style.filter = filter;
      freezeCanvas.style.transform = transform;
      freezeCanvas.style.filter = filter;
    }

    [zoomSlider, panXSlider, panYSlider, brightnessSlider].forEach(el => el.addEventListener('input', updateView));

    // 3D Math Logic
    function getPoint(landmarks, index) { return landmarks[index]; }
    function dist3D(landmarks, p1, p2) {
      const a = getPoint(landmarks, p1), b = getPoint(landmarks, p2);
      return Math.sqrt(Math.pow(a.x - b.x, 2) + Math.pow(a.y - b.y, 2) + Math.pow(a.z - b.z, 2));
    }

    // Advanced MediaPipe Results Processing
    function onResults(results) {
      if(isSmartFreezing && smartFreezeFrames.length > 30) return; // Stop processing if freezing is done

      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

      if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
        const landmarks = results.multiFaceLandmarks[0];

        // 1. Draw Mesh Overlay
        if(showMesh) {
            drawConnectors(canvasCtx, landmarks, FACEMESH_TESSELATION, {color: '#58a6ff', lineWidth: 0.5});
            drawConnectors(canvasCtx, landmarks, FACEMESH_FACE_OVAL, {color: '#3fb950', lineWidth: 2});
            drawConnectors(canvasCtx, landmarks, FACEMESH_RIGHT_EYE, {color: '#f85149', lineWidth: 2});
            drawConnectors(canvasCtx, landmarks, FACEMESH_LEFT_EYE, {color: '#f85149', lineWidth: 2});
        }

        // 2. Calculate Liveness (Spoof Test)
        const faceWidth = dist3D(landmarks, 234, 454);
        const leftEyeOpen = dist3D(landmarks, 159, 145) / faceWidth;
        const rightEyeOpen = dist3D(landmarks, 386, 374) / faceWidth;
        
        // Basic Blink Logic (Variance check)
        const currentEyeAvg = (leftEyeOpen + rightEyeOpen) / 2;
        if(lastEyeDist > 0 && (lastEyeDist - currentEyeAvg) > 0.005) {
            blinkCount++;
            livenessScore = Math.min(100, livenessScore + 20); // Boost score on blink
        }
        lastEyeDist = currentEyeAvg;

        // Static Penalty (If no micro-movements, score drops)
        livenessScore = Math.max(0, livenessScore - 0.5); 

        let livenessStatus = livenessScore > 50 ? "<span style='color:#3fb950'>LIVE FACE DETECTED</span>" : "<span class='spoof-alert'>WARNING: STATIC/SPOOF?</span>";
        
        hud.innerHTML = `Liveness Score: ${Math.round(livenessScore)}%\nStatus: ${livenessStatus}\nBlinks Detected: ${blinkCount}`;

        // 3. Dynamic Vector Display
        const vectorLabels = ["Eye2Eye", "Nose2Chin", "MouthWidth", "LEyeOpen", "REyeOpen", "LipOpen"];
        const vectors = [
            dist3D(landmarks, 33, 263) / faceWidth,
            dist3D(landmarks, 1, 152) / faceWidth,
            dist3D(landmarks, 61, 291) / faceWidth,
            leftEyeOpen,
            rightEyeOpen,
            dist3D(landmarks, 13, 14) / faceWidth
        ];

        let vectorHTML = "";
        vectors.forEach((val, i) => {
            vectorHTML += `<div class="vector-row"><span>${vectorLabels[i]}:</span> <span class="vector-val">${val.toFixed(5)}</span></div>`;
        });
        vectorData.innerHTML = vectorHTML;

        // 4. Smart Freeze Buffer
        if(isSmartFreezing) {
            smartFreezeFrames.push({
                image: canvasElement.toDataURL('image/jpeg', 0.9), // Save frame
                score: (leftEyeOpen + rightEyeOpen) // Higher is better (eyes wide open)
            });
            hud.innerHTML = `<span style='color:#d29922'>ANALYZING FRAMES... (${smartFreezeFrames.length}/30)</span>`;
            
            if(smartFreezeFrames.length >= 30) {
                executeSmartFreeze();
            }
        }

      } else {
        hud.innerHTML = "<span class='spoof-alert'>NO FACE DETECTED</span>";
        vectorData.innerHTML = "Awaiting Face...";
      }
      canvasCtx.restore();
    }

    // Smart Capture Logic
    function startSmartFreeze() {
        if(isSmartFreezing) return;
        isSmartFreezing = true;
        smartFreezeFrames = [];
        hud.innerHTML = "<span style='color:#d29922'>STARTING SMART CAPTURE...</span>";
    }

    function executeSmartFreeze() {
        // Find the frame with highest score (eyes most open)
        let bestFrame = smartFreezeFrames.reduce((max, frame) => frame.score > max.score ? frame : max, smartFreezeFrames[0]);
        
        // Create an image object and draw it to freeze canvas
        let img = new Image();
        img.onload = function() {
            freezeCtx.clearRect(0, 0, freezeCanvas.width, freezeCanvas.height);
            freezeCtx.drawImage(img, 0, 0, freezeCanvas.width, freezeCanvas.height);
            
            // Switch displays
            canvasElement.style.display = 'none';
            freezeCanvas.style.display = 'block';
            
            hud.innerHTML = `<span style='color:#3fb950'>PERFECT FRAME CAPTURED!</span>\nLiveness Verified. Ready for Database.`;
            isSmartFreezing = false;
        };
        img.src = bestFrame.image;
    }

    // Init MediaPipe
    const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
    faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
    faceMesh.onResults(onResults);

    const cameraUtils = new Camera(video, {
      onFrame: async () => { await faceMesh.send({image: video}); },
      width: 1280, height: 720
    });
    
    cameraUtils.start();
    updateView(); // Initial transform apply

  </script>
</body>
</html>
