<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Camera Preview + Recording + Playback</title>
  <style>
    :root{
      --panel-bg: rgba(18,18,18,0.94);
      --accent: #58a6ff;
      --text: #ffffff;
    }

    * { box-sizing: border-box; }

    body{
      margin:0;
      background:#000;
      color:var(--text);
      font-family:Arial, sans-serif;
      overflow:hidden;
    }

    #viewer{
      position:relative;
      width:100vw;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      background:#000;
    }

    video, canvas{
      position:absolute;
      max-width:100%;
      max-height:100%;
      object-fit:contain;
      transform-origin:center center;
      backface-visibility:hidden;
      will-change:transform, filter;
      transition:transform 0.18s ease, filter 0.18s ease;
      filter: brightness(0.92) contrast(1.03) saturate(0.96);
    }

    #camera{
      z-index:2;
    }

    #freezeCanvas{
      display:none;
      z-index:3;
    }

    #analysisCanvas{
      display:none;
    }

    #viewer::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at center,
          rgba(0,0,0,0.00) 0%,
          rgba(0,0,0,0.02) 45%,
          rgba(0,0,0,0.07) 100%);
      z-index:4;
    }

    #hud{
      position:fixed;
      top:10px;
      left:10px;
      z-index:30;
      padding:8px 10px;
      border-radius:10px;
      background:rgba(0,0,0,0.45);
      font-size:12px;
      backdrop-filter: blur(6px);
      line-height:1.5;
      max-width:72vw;
      white-space:pre-line;
    }

    #toggleBtn{
      position:fixed;
      top:10px;
      right:10px;
      z-index:40;
      width:42px;
      height:42px;
      border:none;
      border-radius:50%;
      background:rgba(255,255,255,0.16);
      color:#fff;
      font-size:20px;
      cursor:pointer;
    }

    #controls{
      position:fixed;
      left:0;
      bottom:0;
      width:100%;
      z-index:35;
      padding:14px;
      background:var(--panel-bg);
      border-top:2px solid var(--accent);
      transition:transform 0.28s ease;
      backdrop-filter: blur(8px);
      max-height:60vh;
      overflow:auto;
    }

    #controls.hidden{
      transform:translateY(100%);
    }

    .row{
      display:flex;
      gap:10px;
      align-items:center;
      margin-bottom:10px;
      flex-wrap:wrap;
    }

    .group{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:10px;
    }

    label{
      width:110px;
      flex:0 0 110px;
      font-size:14px;
    }

    input[type="range"]{
      flex:1;
    }

    select, button{
      padding:10px 12px;
      border-radius:10px;
      border:none;
      font-weight:bold;
    }

    select{
      background:#111;
      color:#fff;
      border:1px solid #333;
    }

    button.action{
      background:#1f6feb;
      color:#fff;
      cursor:pointer;
    }

    button.secondary{
      background:#30363d;
      color:#fff;
      cursor:pointer;
    }

    button.warn{
      background:#d29922;
      color:#111;
      cursor:pointer;
    }

    button.danger{
      background:#f85149;
      color:#fff;
      cursor:pointer;
    }

    .value{
      width:60px;
      text-align:right;
      font-size:12px;
      opacity:0.9;
    }

    .btns{
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap:10px;
      margin-top:8px;
    }

    #meterWrap{
      height:10px;
      background:#222;
      border-radius:999px;
      overflow:hidden;
      margin-top:8px;
    }

    #meterBar{
      height:100%;
      width:0%;
      background:#58a6ff;
      transition:width 0.18s ease;
    }

    .small{
      font-size:12px;
      opacity:0.85;
    }

    #playbackPanel{
      position:fixed;
      left:10px;
      right:10px;
      bottom:10px;
      z-index:60;
      background:rgba(0,0,0,0.82);
      border:1px solid #2d2d2d;
      border-radius:12px;
      padding:10px;
      display:none;
      backdrop-filter: blur(8px);
    }

    #playbackVideo{
      width:100%;
      max-height:32vh;
      background:#000;
      border-radius:10px;
      z-index:70;
      display:block;
    }

    #playbackVideo:fullscreen{
      width:100vw;
      height:100vh;
      max-height:none;
      object-fit:contain;
      background:#000;
      border-radius:0;
    }

    .playback-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:8px;
      font-size:13px;
    }

    @media (max-width: 820px){
      .btns{
        grid-template-columns: repeat(2, 1fr);
      }
      label{
        width:86px;
        flex-basis:86px;
      }
      #hud{
        max-width:80vw;
      }
    }
  </style>
</head>
<body>

  <div id="hud">Camera not started</div>
  <button id="toggleBtn" title="Toggle controls">⚙️</button>

  <div id="viewer">
    <video id="camera" autoplay playsinline muted></video>
    <canvas id="freezeCanvas"></canvas>
    <canvas id="analysisCanvas"></canvas>
  </div>

  <div id="playbackPanel">
    <div class="playback-top">
      <div>Recorded video preview</div>
      <button class="secondary" id="closePlaybackBtn">Close Preview</button>
    </div>
    <video id="playbackVideo" controls playsinline></video>
  </div>

  <div id="controls">
    <div class="row">
      <select id="preset">
        <option value="balanced">Balanced</option>
        <option value="lowglare">Low Glare</option>
        <option value="soft">Soft</option>
        <option value="bright">Bright</option>
      </select>

      <label style="width:auto; flex:0 0 auto;">
        <input type="checkbox" id="mirror" checked> Mirror
      </label>

      <label style="width:auto; flex:0 0 auto;">
        <input type="checkbox" id="freeze"> Freeze
      </label>

      <label style="width:auto; flex:0 0 auto;">
        <input type="checkbox" id="autoLight" checked> Auto Light
      </label>
    </div>

    <div class="group">
      <label>Zoom</label>
      <input type="range" id="zoom" min="1" max="3" step="0.01" value="1">
      <div class="value" id="zoomVal">1.00</div>
    </div>

    <div class="group">
      <label>Pan X</label>
      <input type="range" id="panX" min="-300" max="300" step="1" value="0">
      <div class="value" id="panXVal">0</div>
    </div>

    <div class="group">
      <label>Pan Y</label>
      <input type="range" id="panY" min="-300" max="300" step="1" value="0">
      <div class="value" id="panYVal">0</div>
    </div>

    <div class="group">
      <label>Brightness</label>
      <input type="range" id="brightness" min="0.75" max="1.15" step="0.01" value="0.92">
      <div class="value" id="brightnessVal">0.92</div>
    </div>

    <div class="group">
      <label>Contrast</label>
      <input type="range" id="contrast" min="0.95" max="1.12" step="0.01" value="1.03">
      <div class="value" id="contrastVal">1.03</div>
    </div>

    <div class="group">
      <label>Saturate</label>
      <input type="range" id="saturate" min="0.85" max="1.10" step="0.01" value="0.96">
      <div class="value" id="saturateVal">0.96</div>
    </div>

    <div class="small">Brightness meter</div>
    <div id="meterWrap"><div id="meterBar"></div></div>

    <div class="btns">
      <button class="action" id="startBtn">Start Camera</button>
      <button class="action" id="fullscreenBtn">Fullscreen</button>
      <button class="secondary" id="centerBtn">Center</button>
      <button class="secondary" id="snapshotBtn">Freeze Now</button>

      <button class="action" id="recordBtn">Start Record</button>
      <button class="danger" id="stopRecordBtn">Stop Record</button>
      <button class="secondary" id="playRecordedBtn">Play Recording</button>
      <button class="secondary" id="downloadBtn">Download</button>

      <button class="warn" id="resetBtn">Reset</button>
    </div>
  </div>

  <script>
    const video = document.getElementById('camera');
    const freezeCanvas = document.getElementById('freezeCanvas');
    const freezeCtx = freezeCanvas.getContext('2d');
    const analysisCanvas = document.getElementById('analysisCanvas');
    const analysisCtx = analysisCanvas.getContext('2d', { willReadFrequently: true });
    const hud = document.getElementById('hud');
    const controls = document.getElementById('controls');
    const toggleBtn = document.getElementById('toggleBtn');
    const meterBar = document.getElementById('meterBar');
    const playbackPanel = document.getElementById('playbackPanel');
    const playbackVideo = document.getElementById('playbackVideo');

    const els = {
      preset: document.getElementById('preset'),
      mirror: document.getElementById('mirror'),
      freeze: document.getElementById('freeze'),
      autoLight: document.getElementById('autoLight'),
      zoom: document.getElementById('zoom'),
      panX: document.getElementById('panX'),
      panY: document.getElementById('panY'),
      brightness: document.getElementById('brightness'),
      contrast: document.getElementById('contrast'),
      saturate: document.getElementById('saturate'),
      zoomVal: document.getElementById('zoomVal'),
      panXVal: document.getElementById('panXVal'),
      panYVal: document.getElementById('panYVal'),
      brightnessVal: document.getElementById('brightnessVal'),
      contrastVal: document.getElementById('contrastVal'),
      saturateVal: document.getElementById('saturateVal'),
      startBtn: document.getElementById('startBtn'),
      fullscreenBtn: document.getElementById('fullscreenBtn'),
      centerBtn: document.getElementById('centerBtn'),
      snapshotBtn: document.getElementById('snapshotBtn'),
      recordBtn: document.getElementById('recordBtn'),
      stopRecordBtn: document.getElementById('stopRecordBtn'),
      playRecordedBtn: document.getElementById('playRecordedBtn'),
      downloadBtn: document.getElementById('downloadBtn'),
      resetBtn: document.getElementById('resetBtn'),
      closePlaybackBtn: document.getElementById('closePlaybackBtn')
    };

    let stream = null;
    let wakeLock = null;
    let recorder = null;
    let recordedChunks = [];
    let recordedBlob = null;
    let analysisInterval = null;
    let autoAdjustLock = false;
    let recordStartTime = null;
    let recordTimer = null;
    let playbackUrl = null;

    function setHUD(text) {
      hud.textContent = text;
    }

    function formatSeconds(sec) {
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      const s = sec % 60;
      if (h > 0) {
        return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      }
      return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function updateValueLabels() {
      els.zoomVal.textContent = Number(els.zoom.value).toFixed(2);
      els.panXVal.textContent = els.panX.value;
      els.panYVal.textContent = els.panY.value;
      els.brightnessVal.textContent = Number(els.brightness.value).toFixed(2);
      els.contrastVal.textContent = Number(els.contrast.value).toFixed(2);
      els.saturateVal.textContent = Number(els.saturate.value).toFixed(2);
    }

    function applyPreset(name) {
      const presets = {
        balanced: { brightness: 0.92, contrast: 1.03, saturate: 0.96 },
        lowglare: { brightness: 0.86, contrast: 1.00, saturate: 0.92 },
        soft:     { brightness: 0.90, contrast: 0.99, saturate: 0.90 },
        bright:   { brightness: 1.00, contrast: 1.05, saturate: 0.98 }
      };
      const p = presets[name] || presets.balanced;
      els.brightness.value = p.brightness;
      els.contrast.value = p.contrast;
      els.saturate.value = p.saturate;
      updateValueLabels();
      updateView();
    }

    function getTransformString() {
      const zoom = Number(els.zoom.value);
      const panX = Number(els.panX.value);
      const panY = Number(els.panY.value);
      const mirror = els.mirror.checked ? -1 : 1;
      return `translate(${panX}px, ${panY}px) scaleX(${mirror}) scale(${zoom})`;
    }

    function getFilterString() {
      return `brightness(${els.brightness.value}) contrast(${els.contrast.value}) saturate(${els.saturate.value})`;
    }

    function updateView() {
      const transform = getTransformString();
      const filter = getFilterString();

      video.style.transform = transform;
      video.style.filter = filter;
      freezeCanvas.style.transform = transform;
      freezeCanvas.style.filter = filter;

      updateValueLabels();
    }

    function centerView() {
      els.panX.value = 0;
      els.panY.value = 0;
      updateValueLabels();
      updateView();
    }

    function showLive() {
      freezeCanvas.style.display = 'none';
      video.style.display = 'block';
      video.style.visibility = 'visible';
      freezeCanvas.style.visibility = 'visible';
      els.freeze.checked = false;
      setHUD('Live camera preview');
    }

    function freezeFrame() {
      if (!video.videoWidth || !video.videoHeight) return;
      freezeCanvas.width = video.videoWidth;
      freezeCanvas.height = video.videoHeight;
      freezeCtx.drawImage(video, 0, 0, freezeCanvas.width, freezeCanvas.height);
      video.style.display = 'none';
      freezeCanvas.style.display = 'block';
      video.style.visibility = 'visible';
      freezeCanvas.style.visibility = 'visible';
      els.freeze.checked = true;
      setHUD(`Frozen frame: ${freezeCanvas.width}×${freezeCanvas.height}`);
      updateView();
    }

    function resetControls() {
      els.zoom.value = 1;
      els.panX.value = 0;
      els.panY.value = 0;
      els.mirror.checked = true;
      els.freeze.checked = false;
      els.autoLight.checked = true;
      els.preset.value = 'balanced';
      applyPreset('balanced');
      showLive();
    }

    async function startCamera() {
      try {
        if (stream) {
          stream.getTracks().forEach(track => track.stop());
        }

        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: 'user',
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: true
        });

        video.srcObject = stream;
        await video.play();
        showLive();
        startBrightnessAnalysis();
        setHUD('Camera started');
      } catch (err) {
        console.error(err);
        setHUD('Camera access failed');
      }
    }

    async function toggleFullscreen() {
      if (!document.fullscreenElement) {
        await document.documentElement.requestFullscreen();
        try {
          if ('wakeLock' in navigator) {
            wakeLock = await navigator.wakeLock.request('screen');
          }
        } catch (e) {}
      } else {
        await document.exitFullscreen();
      }
    }

    function getSupportedMimeType() {
      const types = [
        'video/webm;codecs=vp9,opus',
        'video/webm;codecs=vp8,opus',
        'video/webm',
        'video/mp4'
      ];
      return types.find(t => MediaRecorder.isTypeSupported(t)) || '';
    }

    function startRecordTimer() {
      recordStartTime = Date.now();
      if (recordTimer) clearInterval(recordTimer);

      recordTimer = setInterval(() => {
        const sec = Math.floor((Date.now() - recordStartTime) / 1000);
        hud.textContent = `Recording...\nDuration: ${formatSeconds(sec)}`;
      }, 1000);
    }

    function stopRecordTimer() {
      if (recordTimer) {
        clearInterval(recordTimer);
        recordTimer = null;
      }
    }

    function startRecording() {
      if (!stream) {
        alert('Start camera first');
        return;
      }

      if (recorder && recorder.state === 'recording') return;

      recordedChunks = [];
      recordedBlob = null;

      if (playbackUrl) {
        URL.revokeObjectURL(playbackUrl);
        playbackUrl = null;
      }

      playbackVideo.pause();
      playbackVideo.removeAttribute('src');
      playbackVideo.load();
      playbackPanel.style.display = 'none';

      try {
        const mimeType = getSupportedMimeType();
        recorder = mimeType
          ? new MediaRecorder(stream, { mimeType })
          : new MediaRecorder(stream);

        recorder.ondataavailable = (e) => {
          if (e.data && e.data.size > 0) recordedChunks.push(e.data);
        };

        recorder.onstop = () => {
          const type = recorder.mimeType || 'video/webm';
          recordedBlob = new Blob(recordedChunks, { type });

          playbackUrl = URL.createObjectURL(recordedBlob);
          playbackVideo.src = playbackUrl;
          playbackVideo.load();
          playbackPanel.style.display = 'block';

          stopRecordTimer();
          setHUD(`Recording complete\nSize: ${(recordedBlob.size / 1024 / 1024).toFixed(2)} MB`);
        };

        recorder.start(1000);
        startRecordTimer();
        setHUD('Recording started');
      } catch (err) {
        console.error(err);
        alert('Recording not supported on this browser/device');
      }
    }

    function stopRecording() {
      if (recorder && recorder.state === 'recording') {
        recorder.stop();
      }
    }

    async function playRecordingFullscreen() {
      if (!recordedBlob) {
        alert('No recording available');
        return;
      }

      playbackPanel.style.display = 'block';

      video.pause();
      video.style.visibility = 'hidden';
      freezeCanvas.style.visibility = 'hidden';

      playbackVideo.style.display = 'block';
      playbackVideo.currentTime = 0;

      try {
        await playbackVideo.play();
      } catch (e) {
        console.log('Playback start error', e);
      }

      try {
        await playbackVideo.requestFullscreen();
      } catch (e) {
        console.log('Fullscreen error', e);
      }
    }

    async function closePlayback() {
      playbackVideo.pause();
      playbackPanel.style.display = 'none';

      if (document.fullscreenElement === playbackVideo) {
        try {
          await document.exitFullscreen();
        } catch (e) {}
      }

      video.style.visibility = 'visible';
      freezeCanvas.style.visibility = 'visible';

      try {
        if (stream && !els.freeze.checked) {
          await video.play();
        }
      } catch (e) {}
    }

    function downloadRecording() {
      if (!recordedBlob) {
        alert('No recording available');
        return;
      }

      const ext = recordedBlob.type.includes('mp4') ? 'mp4' : 'webm';
      const url = URL.createObjectURL(recordedBlob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `camera-recording-${Date.now()}.${ext}`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 3000);
    }

    function analyzeBrightness() {
      if (!video.videoWidth || !video.videoHeight || els.freeze.checked) return;

      const sampleW = 160;
      const sampleH = 120;
      analysisCanvas.width = sampleW;
      analysisCanvas.height = sampleH;

      analysisCtx.drawImage(video, 0, 0, sampleW, sampleH);
      const imageData = analysisCtx.getImageData(0, 0, sampleW, sampleH).data;

      let total = 0;
      let hotPixels = 0;
      const pixelCount = sampleW * sampleH;

      for (let i = 0; i < imageData.length; i += 4) {
        const r = imageData[i];
        const g = imageData[i + 1];
        const b = imageData[i + 2];
        const lum = 0.2126 * r + 0.7152 * g + 0.0722 * b;
        total += lum;
        if (lum > 245) hotPixels++;
      }

      const avg = total / pixelCount;
      const hotRatio = hotPixels / pixelCount;
      const percent = Math.max(0, Math.min(100, (avg / 255) * 100));

      meterBar.style.width = percent + '%';

      if (els.autoLight.checked) {
        autoAdjustLight(avg, hotRatio);
      }

      const glareText = hotRatio > 0.04 ? 'high' : hotRatio > 0.015 ? 'medium' : 'low';

      if (!(recorder && recorder.state === 'recording')) {
        hud.textContent = `Live: ${video.videoWidth}×${video.videoHeight}\nBrightness: ${avg.toFixed(0)}/255 | glare: ${glareText}`;
      }
    }

    function autoAdjustLight(avg, hotRatio) {
      if (autoAdjustLock) return;
      autoAdjustLock = true;

      let b = Number(els.brightness.value);
      let c = Number(els.contrast.value);
      let s = Number(els.saturate.value);

      if (avg < 85) {
        b = Math.min(1.08, b + 0.01);
        c = Math.min(1.08, c + 0.005);
      } else if (avg > 165) {
        b = Math.max(0.82, b - 0.01);
      }

      if (hotRatio > 0.03) {
        c = Math.max(0.98, c - 0.01);
        b = Math.max(0.82, b - 0.01);
        s = Math.max(0.90, s - 0.005);
      }

      els.brightness.value = b.toFixed(2);
      els.contrast.value = c.toFixed(2);
      els.saturate.value = s.toFixed(2);

      updateValueLabels();
      updateView();

      setTimeout(() => {
        autoAdjustLock = false;
      }, 250);
    }

    function startBrightnessAnalysis() {
      if (analysisInterval) clearInterval(analysisInterval);
      analysisInterval = setInterval(analyzeBrightness, 500);
    }

    toggleBtn.addEventListener('click', () => {
      controls.classList.toggle('hidden');
    });

    els.startBtn.addEventListener('click', startCamera);
    els.fullscreenBtn.addEventListener('click', toggleFullscreen);
    els.centerBtn.addEventListener('click', centerView);
    els.snapshotBtn.addEventListener('click', freezeFrame);
    els.recordBtn.addEventListener('click', startRecording);
    els.stopRecordBtn.addEventListener('click', stopRecording);
    els.playRecordedBtn.addEventListener('click', playRecordingFullscreen);
    els.downloadBtn.addEventListener('click', downloadRecording);
    els.resetBtn.addEventListener('click', resetControls);
    els.closePlaybackBtn.addEventListener('click', closePlayback);

    els.freeze.addEventListener('change', () => {
      if (els.freeze.checked) freezeFrame();
      else showLive();
    });

    els.preset.addEventListener('change', () => applyPreset(els.preset.value));

    [
      els.zoom, els.panX, els.panY,
      els.brightness, els.contrast, els.saturate,
      els.mirror
    ].forEach(el => el.addEventListener('input', updateView));

    video.addEventListener('loadedmetadata', () => {
      setHUD(`Live: ${video.videoWidth}×${video.videoHeight}`);
    });

    document.addEventListener('fullscreenchange', async () => {
      const fsEl = document.fullscreenElement;
      const isPlaybackFs = fsEl === playbackVideo;

      if (fsEl) {
        toggleBtn.style.display = 'none';
        controls.classList.add('hidden');

        if (!isPlaybackFs) {
          playbackPanel.style.display = 'none';
        }
      } else {
        toggleBtn.style.display = 'block';

        if (recordedBlob) {
          playbackPanel.style.display = 'block';
        }

        video.style.visibility = 'visible';
        freezeCanvas.style.visibility = 'visible';

        try {
          if (stream && !els.freeze.checked) {
            await video.play();
          }
        } catch (e) {}
      }

      if (!document.fullscreenElement && wakeLock) {
        try { await wakeLock.release(); } catch (e) {}
        wakeLock = null;
      }
    });

    applyPreset('balanced');
    updateView();
  </script>
</body>
</html>
